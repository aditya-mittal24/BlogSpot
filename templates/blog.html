{% extends 'base.html' %}
{% load static %}

{% block contents %}
<link rel="stylesheet" href="{% static 'css/blog.css' %}">
{% if blog %}
<div class="flex py-8 px-4 justify-center">
    <div class="max-w-[720px]">
        <h1 class="lg:text-5xl md:text-4xl text-3xl font-bold">{{blog.title}}</h1>
        <h3 class="text-xl font-normal my-6">{{blog.user.first_name}} {{blog.user.last_name}} ∙ <span
                class="text-[#757575] text-lg">{{blog.created_at | date:"d N Y"}}</span></h3>
        {% if blog.image %}
        <img src="/media/{{blog.image}}" alt="">
        {% endif %}
        <div class="content my-6 leading-8">
            {{blog.content.html | safe}}
        </div>
    </div>
</div>
{% endif %}
{% endblock contents %}・・
